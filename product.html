<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Martin's Door Is Open — Product</title>
<style>
  :root{
    --bg:#fffaf2;
    --ink:#161616;
    --muted:#6b6b6b;
    --accent:#e63946;
    --accent2:#ffb703;
    --soft:#f1e7d6;
    --green:#3a8a3a;
    --shadow:6px 6px 0 #161616;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}

  .promo{background:var(--ink);color:#fffaf2;text-align:center;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px}

  header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:2px solid var(--ink)}
  .nav{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.02em;font-size:20px}
  .brand .dot{width:14px;height:14px;background:var(--accent);border:2px solid var(--ink);transform:rotate(45deg)}
  nav ul{list-style:none;display:flex;gap:22px;font-weight:600;font-size:14px}
  nav a:hover{color:var(--accent)}
  .cart{display:flex;align-items:center;gap:14px}
  .cart .bag{border:2px solid var(--ink);padding:8px 14px;font-weight:700;font-size:13px;background:#fff;box-shadow:var(--shadow)}

  .crumbs{max-width:1200px;margin:0 auto;padding:18px 24px 0;font-size:13px;color:var(--muted)}
  .crumbs a:hover{color:var(--ink)}

  .product{max-width:1200px;margin:0 auto;padding:28px 24px 72px;display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:start}
  .gallery{border:2px solid var(--ink);background:var(--soft);box-shadow:var(--shadow);position:relative;overflow:hidden;aspect-ratio:1/1}
  .gallery img{width:100%;height:100%;object-fit:cover;display:block}
  .gallery .badge{position:absolute;top:14px;left:14px;background:var(--ink);color:#fff;font-size:11px;font-weight:800;letter-spacing:.12em;padding:5px 10px;text-transform:uppercase;z-index:3}
  .gallery .badge.pg13{background:var(--accent2);color:#161616}
  .gallery .badge.oos{background:#666}
  .gallery .oos-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:2}
  .gallery .oos-overlay span{background:#fffaf2;color:#161616;border:2px solid #161616;padding:10px 20px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:18px;transform:rotate(-6deg)}
  .thumbs{display:flex;gap:10px;margin-top:14px}
  .thumb{flex:1;aspect-ratio:1/1;border:2px solid var(--ink);background:var(--soft);overflow:hidden;cursor:pointer;transition:transform .15s ease}
  .thumb:hover{transform:translateY(-2px)}
  .thumb img{width:100%;height:100%;object-fit:cover}

  .info .eyebrow{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;background:var(--ink);color:#fffaf2;padding:4px 10px;margin-bottom:14px}
  .info h1{font-size:clamp(36px,5vw,56px);line-height:1;letter-spacing:-.03em;font-weight:900}
  .info .tag{margin-top:6px;color:var(--muted);font-size:14px}
  .info .rating{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .info .rating .stars{color:var(--accent2);letter-spacing:2px;font-size:15px}
  .info .price-block{margin-top:22px;display:flex;align-items:baseline;gap:14px}
  .info .price{font-size:38px;font-weight:900;letter-spacing:-.02em}
  .info .strike{color:var(--muted);text-decoration:line-through;font-size:18px}
  .info .save{background:var(--accent);color:#fff;padding:3px 8px;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}

  .qty-row{margin-top:24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .qty{display:flex;align-items:center;border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow)}
  .qty button{width:44px;height:46px;background:transparent;border:none;font-size:20px;font-weight:900;cursor:pointer}
  .qty button:hover{background:var(--soft)}
  .qty span{width:50px;text-align:center;font-weight:900;font-size:16px}
  .add-big{flex:1;min-width:200px;padding:14px 24px;background:var(--accent);color:#fff;border:2px solid var(--ink);box-shadow:var(--shadow);font-weight:900;letter-spacing:.05em;text-transform:uppercase;font-size:14px;cursor:pointer;transition:transform .15s ease}
  .add-big:hover:not(:disabled){transform:translate(-2px,-2px);background:#161616}
  .add-big:disabled{background:#999;cursor:not-allowed;color:#eee}

  .perks{margin-top:26px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .perk{border:2px solid var(--ink);padding:12px 14px;background:#fff;font-size:13px;display:flex;align-items:center;gap:10px}
  .perk b{display:block}
  .perk small{color:var(--muted);font-size:12px}

  .desc-block{margin-top:32px;border-top:2px solid var(--ink);padding-top:24px}
  .desc-block h3{font-size:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
  .desc-block p{margin-bottom:12px;font-size:15px;color:#2a2a2a;line-height:1.65}
  .desc-block ul{margin-left:20px;font-size:14px;color:#333}
  .desc-block ul li{margin-bottom:4px}

  /* Reviews on product page */
  .product-reviews{max-width:1200px;margin:0 auto;padding:48px 24px;border-top:2px solid var(--ink)}
  .product-reviews h2{font-size:clamp(28px,3.5vw,40px);letter-spacing:-.02em;margin-bottom:24px}
  .pr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .pr-card{border:2px solid var(--ink);background:#fff;padding:20px;box-shadow:var(--shadow)}
  .pr-card .stars{color:var(--accent2);letter-spacing:2px;font-size:14px;margin-bottom:8px}
  .pr-card .q{font-size:14px;line-height:1.55}
  .pr-card .by{margin-top:12px;font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase}
  .pr-card .by small{display:block;font-weight:500;color:var(--muted);letter-spacing:0;text-transform:none;margin-top:2px}

  /* Related */
  .related{max-width:1200px;margin:0 auto;padding:24px 24px 72px;border-top:2px solid var(--ink)}
  .related h2{font-size:clamp(28px,3.5vw,40px);letter-spacing:-.02em;margin:24px 0}
  .rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
  .rel{border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s ease}
  .rel:hover{transform:translate(-2px,-2px)}
  .rel .rel-ph{aspect-ratio:1/1;background:var(--soft);border-bottom:2px solid var(--ink);overflow:hidden}
  .rel .rel-ph img{width:100%;height:100%;object-fit:cover}
  .rel .rel-body{padding:12px 14px}
  .rel h5{font-size:14px;letter-spacing:-.01em}
  .rel .rel-price{margin-top:4px;font-weight:900;font-size:14px}

  footer{background:var(--ink);color:#bdbdbd;padding:36px 24px;text-align:center;font-size:13px;border-top:2px solid var(--ink)}
  footer b{color:#fffaf2}

  .notfound{max-width:680px;margin:80px auto;padding:48px 32px;text-align:center;border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow)}
  .notfound h1{font-size:48px;letter-spacing:-.02em;margin-bottom:14px}
  .notfound a.btn{display:inline-block;margin-top:24px;padding:14px 22px;background:var(--accent);color:#fff;border:2px solid var(--ink);box-shadow:var(--shadow);font-weight:800}

  @media (max-width: 880px){
    .product{grid-template-columns:1fr;padding-bottom:48px}
    .perks{grid-template-columns:1fr}
    nav ul{display:none}
  }
</style>
</head>
<body>

<div class="promo">
  <span>Free delivery on orders over $19.99 · </span>
  <strong>We live. We love. We lie.</strong>
</div>

<header>
  <div class="nav">
    <a class="brand" href="index.html">
      <div class="dot"></div>
      Martin's Door Is Open
    </a>
    <nav>
      <ul>
        <li><a href="index.html#shop">Shop</a></li>
        <li><a href="index.html#reviews">Reviews</a></li>
        <li><a href="index.html#careers">Careers</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
    <div class="cart">
      <a class="bag" href="index.html#shop">Bag (0)</a>
    </div>
  </div>
</header>

<div id="root"></div>

<footer>
  © 2026 <b>Martin's Door Is Open</b> · we live · we love · we lie<br/>
  This shop exists in the space between a corner store and a confession booth.
</footer>

<script>
  const PRODUCTS = {
    redbull: {
      name: "Red Bull · 250ml",
      eyebrow: "Energy · PG-13",
      tag: "Carbonated, taurine-laced, deadline-summoning.",
      badge: { text: "PG-13", cls: "pg13" },
      price: 3.49,
      strike: 3.99,
      img: "https://loremflickr.com/900/900/redbull,energy,can",
      thumbs: [
        "https://loremflickr.com/300/300/redbull,can",
        "https://loremflickr.com/300/300/energy,drink",
        "https://loremflickr.com/300/300/aluminum,can"
      ],
      rating: 4.8,
      reviewCount: 412,
      paragraphs: [
        "Some friends bring wine. Red Bull brings consequences. This is the 250ml original — silver, blue, and slightly judgmental.",
        "Best consumed at 11:47 PM right before you decide to rewrite the whole codebase. Pairs well with regret, deadlines, and Tic Tacs from this very shop."
      ],
      bullets: [
        "80mg caffeine. About one (1) bad decision per can.",
        "Recyclable aluminum. Like your last relationship.",
        "PG-13 only — we card the under-13s aggressively. Sorry, Timmy."
      ],
      reviews: [
        { stars: 5, who: "Denis Spivakov", note: "3rd visit this week", quote: "Walked in for one. Walked out questioning my career arc." },
        { stars: 5, who: "Viggo Biancini", note: "Verified buyer", quote: "Tasted like 4 a.m. and Friday all at once. Sublime." }
      ],
      stock: true
    },
    tictac: {
      name: "Tic Tac · Mogu Mogu Rip-Off Edition",
      eyebrow: "Candy · Suspicious",
      tag: "Tiny. Fruity. Probably legal in 47 states.",
      badge: { text: "Cult Pick" },
      price: 1.99,
      img: "https://loremflickr.com/900/900/tictac,candy,mints",
      thumbs: [
        "https://loremflickr.com/300/300/tictac,mints",
        "https://loremflickr.com/300/300/candy,colorful",
        "https://loremflickr.com/300/300/sweets"
      ],
      rating: 4.6,
      reviewCount: 198,
      paragraphs: [
        "These started life as Tic Tacs. Then someone in the back room read about Mogu Mogu and got ideas. Now they're a small white box with big, juicy intentions.",
        "Distinctly fruity, slightly chewy on the soul. Lawyers contacted. Lawyers ignored. The shelf keeps shelving."
      ],
      bullets: [
        "Approximately 38 tiny pieces of plausible deniability.",
        "Five mystery flavors. Four are good. One is a vibe.",
        "Box rattles satisfyingly in jacket pockets — built-in mood ring."
      ],
      reviews: [
        { stars: 5, who: "Richard Han", note: "Verified buyer", quote: "Tastes vaguely litigious. I love it." },
        { stars: 4, who: "Cailte Scully", note: "Verified buyer", quote: "Ate one. Felt seen. Ate seven more." }
      ],
      stock: true
    },
    apple: {
      name: "Pink Lady Apples",
      eyebrow: "Fresh · One healthy item",
      tag: "Sweet, tart, photogenic. Sold by the piece.",
      badge: { text: "Fresh" },
      price: 0.89,
      img: "https://loremflickr.com/900/900/pink-lady,apple,fruit",
      thumbs: [
        "https://loremflickr.com/300/300/apple,red",
        "https://loremflickr.com/300/300/fruit,fresh",
        "https://loremflickr.com/300/300/orchard,apple"
      ],
      rating: 4.9,
      reviewCount: 87,
      paragraphs: [
        "The one quarterly purchase that makes you feel like a functional adult. A Pink Lady is sweeter than a Granny Smith, crunchier than your last excuse, and exactly the shade your camera wants.",
        "Sourced from somewhere. Probably an orchard. Definitely real."
      ],
      bullets: [
        "Naturally crunchy. Aggressively photogenic.",
        "Pairs well with peanut butter, regret, or a knife and contemplation.",
        "Comes with one (1) free reminder that you can, in fact, do this."
      ],
      reviews: [
        { stars: 5, who: "Alex Anurov", note: "Repeat offender", quote: "The most honest thing I've held in months." },
        { stars: 5, who: "Denis Spivakov", note: "Verified buyer", quote: "Crisp. Pink. Lady-like. Five stars." }
      ],
      stock: true
    },
    peppa: {
      name: "Peppa Pig · Plushy Pal",
      eyebrow: "Limited · Plush",
      tag: "Emotional support snack — non-edible.",
      badge: { text: "Limited" },
      price: 12.50,
      img: "https://loremflickr.com/900/900/peppa-pig,plush,toy",
      thumbs: [
        "https://loremflickr.com/300/300/plush,pink",
        "https://loremflickr.com/300/300/toy,soft",
        "https://loremflickr.com/300/300/pig,cute"
      ],
      rating: 4.7,
      reviewCount: 56,
      paragraphs: [
        "Peppa doesn't ask. Peppa doesn't tell. Peppa simply exists, slightly to your left, judging quietly and absorbing the static of the room.",
        "Hand-stitched somewhere. Vibes-tested by Martin personally."
      ],
      bullets: [
        "Approximately 14 inches of unconditional pink.",
        "Machine-washable conscience.",
        "Will not ask why you bought it at 2 a.m."
      ],
      reviews: [
        { stars: 4, who: "Alex Anurov", note: "Repeat offender", quote: "The Peppa was vibrating slightly. I felt understood." },
        { stars: 5, who: "Viggo Biancini", note: "Verified buyer", quote: "Slept better than I have in years. Peppa knows." }
      ],
      stock: true
    },
    kinder: {
      name: "Kinder Eggs · Surprise Inside",
      eyebrow: "Chocolate · Maybe",
      tag: "Allegedly chocolate. Allegedly surprise. Allegedly in stock.",
      badge: { text: "Out of stock", cls: "oos" },
      price: 2.20,
      img: "https://loremflickr.com/900/900/kinder,chocolate,egg",
      thumbs: [
        "https://loremflickr.com/300/300/chocolate,egg",
        "https://loremflickr.com/300/300/foil,wrap",
        "https://loremflickr.com/300/300/candy,gold"
      ],
      rating: 4.9,
      reviewCount: 1204,
      paragraphs: [
        "Gold foil. Hollow promise. Tiny plastic dream inside. The Kinder Egg is the only product in this store that comes with built-in suspense — and right now, with built-in unavailability.",
        "Martin says they'll be back \"soon.\" Martin says a lot of things. Drop your email and we'll lie to you gently."
      ],
      bullets: [
        "Comes with a toy you'll lose by Thursday.",
        "Comes with chocolate you'll eat by Tuesday.",
        "Comes with the gnawing question: was the toy worth it?"
      ],
      reviews: [
        { stars: 5, who: "Cailte Scully", note: "Knows where the eggs are", quote: "Martin's eyes told me the truth. I bought three apples instead." },
        { stars: 5, who: "Richard Han", note: "Verified buyer", quote: "Best egg I ever had. Crying about it now." }
      ],
      stock: false
    }
  };

  function getParam(name){
    const p = new URLSearchParams(location.search);
    return p.get(name);
  }

  function renderRelated(currentId){
    const ids = Object.keys(PRODUCTS).filter(id => id !== currentId).slice(0, 4);
    return `
      <section class="related">
        <h2>While you're at the door</h2>
        <div class="rel-grid">
          ${ids.map(id => {
            const p = PRODUCTS[id];
            return `
              <a class="rel" href="product.html?id=${id}">
                <div class="rel-ph"><img src="${p.thumbs[0]}" alt="${p.name}" onerror="this.style.background='#f1e7d6'"></div>
                <div class="rel-body">
                  <h5>${p.name}</h5>
                  <div class="rel-price">$${p.price.toFixed(2)}${p.stock ? '' : ' · sold out'}</div>
                </div>
              </a>`;
          }).join('')}
        </div>
      </section>`;
  }

  function render(){
    const id = getParam('id');
    const p = PRODUCTS[id];
    const root = document.getElementById('root');
    document.title = p ? `${p.name} — Martin's Door Is Open` : 'Not found — Martin\'s Door Is Open';

    if (!p){
      root.innerHTML = `
        <div class="notfound">
          <h1>404 · Door's open, shelf is empty</h1>
          <p>That product doesn't exist. Or it did, and Martin sold it to a guy in a leather jacket. Either way — try another.</p>
          <a class="btn" href="index.html#shop">← Back to the shelf</a>
        </div>`;
      return;
    }

    const badgeHTML = p.badge ? `<span class="badge ${p.badge.cls || ''}">${p.badge.text}</span>` : '';
    const oosOverlay = !p.stock ? `<div class="oos-overlay"><span>Sold out</span></div>` : '';
    const stars = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5 - Math.round(p.rating));
    const strikeHTML = p.strike ? `<div class="strike">$${p.strike.toFixed(2)}</div><div class="save">Save $${(p.strike - p.price).toFixed(2)}</div>` : '';

    root.innerHTML = `
      <div class="crumbs">
        <a href="index.html">Home</a> / <a href="index.html#shop">Shop</a> / <span>${p.name}</span>
      </div>

      <main class="product">
        <div>
          <div class="gallery">
            ${badgeHTML}
            <img id="mainImg" src="${p.img}" alt="${p.name}"
                 onerror="this.style.background='var(--soft)';this.style.opacity='.3'">
            ${oosOverlay}
          </div>
          <div class="thumbs">
            ${p.thumbs.map(t => `
              <div class="thumb" onclick="document.getElementById('mainImg').src='${t.replace('/300/300/','/900/900/')}'">
                <img src="${t}" alt="" onerror="this.style.background='var(--soft)'">
              </div>`).join('')}
          </div>
        </div>

        <div class="info">
          <div class="eyebrow">${p.eyebrow}</div>
          <h1>${p.name}</h1>
          <div class="tag">${p.tag}</div>

          <div class="rating">
            <span class="stars">${stars}</span>
            <span>${p.rating.toFixed(1)} · ${p.reviewCount} reviews</span>
          </div>

          <div class="price-block">
            <div class="price">$${p.price.toFixed(2)}</div>
            ${strikeHTML}
          </div>

          <div class="qty-row">
            <div class="qty">
              <button id="qtyMinus" type="button">−</button>
              <span id="qtyVal">1</span>
              <button id="qtyPlus" type="button">+</button>
            </div>
            <button class="add-big" id="addBig" ${!p.stock ? 'disabled' : ''}>
              ${p.stock ? 'Add to bag' : 'Notify me when back'}
            </button>
          </div>

          <div class="perks">
            <div class="perk">🚚 <div><b>Same-day local</b><small>If we like you</small></div></div>
            <div class="perk">🔁 <div><b>14-day returns</b><small>Bring it back, no eye contact</small></div></div>
            <div class="perk">🔒 <div><b>Honest pricing*</b><small>*honest about lying</small></div></div>
            <div class="perk">💬 <div><b>WhatsApp Martin</b><small>If he added you</small></div></div>
          </div>

          <div class="desc-block">
            <h3>The full story</h3>
            ${p.paragraphs.map(t => `<p>${t}</p>`).join('')}
            <ul>
              ${p.bullets.map(b => `<li>${b}</li>`).join('')}
            </ul>
          </div>
        </div>
      </main>

      <section class="product-reviews">
        <h2>What buyers whisper about this one</h2>
        <div class="pr-grid">
          ${p.reviews.map(r => `
            <div class="pr-card">
              <div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</div>
              <div class="q">"${r.quote}"</div>
              <div class="by">${r.who}<small>${r.note}</small></div>
            </div>`).join('')}
        </div>
      </section>

      ${renderRelated(id)}
    `;

    // Quantity + add to bag wiring
    let qty = 1;
    const qtyVal = document.getElementById('qtyVal');
    document.getElementById('qtyMinus').addEventListener('click', () => {
      if (qty > 1){ qty--; qtyVal.textContent = qty; }
    });
    document.getElementById('qtyPlus').addEventListener('click', () => {
      qty++; qtyVal.textContent = qty;
    });

    const addBig = document.getElementById('addBig');
    addBig.addEventListener('click', () => {
      if (addBig.disabled) return;
      let count = parseInt(sessionStorage.getItem('bagCount') || '0', 10);
      count += qty;
      sessionStorage.setItem('bagCount', count);
      document.querySelector('.bag').textContent = 'Bag (' + count + ')';
      const orig = addBig.textContent;
      addBig.textContent = '✓ Added ' + qty + ' to bag';
      addBig.style.background = '#3a8a3a';
      setTimeout(() => { addBig.textContent = orig; addBig.style.background = ''; }, 1400);
    });

    // Restore cart counter
    const bag = document.querySelector('.bag');
    const c = parseInt(sessionStorage.getItem('bagCount') || '0', 10);
    if (c) bag.textContent = 'Bag (' + c + ')';
  }

  render();
</script>

</body>
</html>
