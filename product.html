<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Martin's Door Is Open — Product</title>
<style>
  :root{
    --bg:#fffaf2;
    --ink:#161616;
    --muted:#6b6b6b;
    --accent:#e63946;
    --accent2:#ffb703;
    --soft:#f1e7d6;
    --green:#3a8a3a;
    --shadow:6px 6px 0 #161616;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}

  .promo{background:var(--ink);color:#fffaf2;text-align:center;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px}

  header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:2px solid var(--ink)}
  .nav{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.02em;font-size:20px}
  .brand .dot{width:14px;height:14px;background:var(--accent);border:2px solid var(--ink);transform:rotate(45deg)}
  nav ul{list-style:none;display:flex;gap:22px;font-weight:600;font-size:14px}
  nav a:hover{color:var(--accent)}
  .cart{display:flex;align-items:center;gap:14px}
  .cart .bag{border:2px solid var(--ink);padding:8px 14px;font-weight:700;font-size:13px;background:#fff;box-shadow:var(--shadow);cursor:pointer}

  .crumbs{max-width:1200px;margin:0 auto;padding:18px 24px 0;font-size:13px;color:var(--muted)}
  .crumbs a:hover{color:var(--ink)}

  .product{max-width:1200px;margin:0 auto;padding:28px 24px 72px;display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:start}
  .gallery{border:2px solid var(--ink);background:var(--soft);box-shadow:var(--shadow);position:relative;overflow:hidden;aspect-ratio:1/1}
  .gallery img{width:100%;height:100%;object-fit:cover;display:block}
  .gallery .badge{position:absolute;top:14px;left:14px;background:var(--ink);color:#fff;font-size:11px;font-weight:800;letter-spacing:.12em;padding:5px 10px;text-transform:uppercase;z-index:3}
  .gallery .badge.pg13{background:var(--accent2);color:#161616}
  .gallery .badge.oos{background:#666}
  .gallery .oos-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:2}
  .gallery .oos-overlay span{background:#fffaf2;color:#161616;border:2px solid #161616;padding:10px 20px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:18px;transform:rotate(-6deg)}
  .thumbs{display:flex;gap:10px;margin-top:14px}
  .thumb{flex:1;aspect-ratio:1/1;border:2px solid var(--ink);background:var(--soft);overflow:hidden;cursor:pointer;transition:transform .15s ease}
  .thumb:hover{transform:translateY(-2px)}
  .thumb img{width:100%;height:100%;object-fit:cover}

  .info .eyebrow{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;background:var(--ink);color:#fffaf2;padding:4px 10px;margin-bottom:14px}
  .info h1{font-size:clamp(36px,5vw,56px);line-height:1;letter-spacing:-.03em;font-weight:900}
  .info .tag{margin-top:6px;color:var(--muted);font-size:14px}
  .info .rating{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .info .rating .stars{color:var(--accent2);letter-spacing:2px;font-size:15px}
  .info .price-block{margin-top:22px;display:flex;align-items:baseline;gap:14px}
  .info .price{font-size:38px;font-weight:900;letter-spacing:-.02em}
  .info .strike{color:var(--muted);text-decoration:line-through;font-size:18px}
  .info .save{background:var(--accent);color:#fff;padding:3px 8px;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}

  .qty-row{margin-top:24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .qty{display:flex;align-items:center;border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow)}
  .qty button{width:44px;height:46px;background:transparent;border:none;font-size:20px;font-weight:900;cursor:pointer}
  .qty button:hover{background:var(--soft)}
  .qty span{width:50px;text-align:center;font-weight:900;font-size:16px}
  .add-big{flex:1;min-width:200px;padding:14px 24px;background:var(--accent);color:#fff;border:2px solid var(--ink);box-shadow:var(--shadow);font-weight:900;letter-spacing:.05em;text-transform:uppercase;font-size:14px;cursor:pointer;transition:transform .15s ease}
  .add-big:hover:not(:disabled){transform:translate(-2px,-2px);background:#161616}
  .add-big:disabled{background:#999;cursor:not-allowed;color:#eee}

  .perks{margin-top:26px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .perk{border:2px solid var(--ink);padding:12px 14px;background:#fff;font-size:13px;display:flex;align-items:center;gap:10px}
  .perk b{display:block}
  .perk small{color:var(--muted);font-size:12px}

  .desc-block{margin-top:32px;border-top:2px solid var(--ink);padding-top:24px}
  .desc-block h3{font-size:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
  .desc-block p{margin-bottom:12px;font-size:15px;color:#2a2a2a;line-height:1.65}
  .desc-block ul{margin-left:20px;font-size:14px;color:#333}
  .desc-block ul li{margin-bottom:4px}

  /* Color picker (pen product page) */
  .color-picker{margin:16px 0 4px;border:2px solid var(--ink);padding:14px 16px;background:#fafafa}
  .cp-label{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;color:#444}
  .cp-label span{color:var(--ink)}
  .cp-swatches{display:flex;gap:10px;flex-wrap:wrap}
  .cp-swatch{width:30px;height:30px;border-radius:50%;border:2px solid var(--ink);cursor:pointer;transition:transform .12s;flex-shrink:0;padding:0;background:transparent}
  .cp-swatch:hover{transform:scale(1.15)}
  .cp-swatch.active{transform:scale(1.28);box-shadow:0 0 0 3px #fff,0 0 0 5px var(--ink)}

  /* Reviews on product page */
  .product-reviews{max-width:1200px;margin:0 auto;padding:48px 24px;border-top:2px solid var(--ink)}
  .product-reviews h2{font-size:clamp(28px,3.5vw,40px);letter-spacing:-.02em;margin-bottom:18px}
  .pr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .pr-card{border:2px solid var(--ink);background:#fff;padding:20px;box-shadow:var(--shadow)}
  .pr-card .stars{color:var(--accent2);letter-spacing:2px;font-size:14px;margin-bottom:8px}
  .pr-card .q{font-size:14px;line-height:1.55}
  .pr-card .by{margin-top:12px;font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase}

  /* Community reviews (product page) */
  .cr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-top:24px}
  .cr-card{background:#fffaf2;border:2px solid var(--ink);padding:22px;box-shadow:6px 6px 0 var(--accent2)}
  .cr-stars{color:var(--accent2);letter-spacing:2px;margin-bottom:10px;font-size:14px;-webkit-text-stroke:.4px var(--ink)}
  .cr-text{font-size:15px;line-height:1.55;color:#222}
  .cr-who{margin-top:14px;font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .cr-who small{display:block;font-weight:500;color:#666;text-transform:none;letter-spacing:0;margin-top:2px}
  .cr-empty{color:#888;font-size:14px;padding:24px 0;font-style:italic}
  .pr-card .by small{display:block;font-weight:500;color:var(--muted);letter-spacing:0;text-transform:none;margin-top:2px}

  /* Related */
  .related{max-width:1200px;margin:0 auto;padding:24px 24px 72px;border-top:2px solid var(--ink)}
  .related h2{font-size:clamp(28px,3.5vw,40px);letter-spacing:-.02em;margin:24px 0}
  .rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
  .rel{border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s ease}
  .rel:hover{transform:translate(-2px,-2px)}
  .rel .rel-ph{aspect-ratio:1/1;background:var(--soft);border-bottom:2px solid var(--ink);overflow:hidden}
  .rel .rel-ph img{width:100%;height:100%;object-fit:cover}
  .rel .rel-body{padding:12px 14px}
  .rel h5{font-size:14px;letter-spacing:-.01em}
  .rel .rel-price{margin-top:4px;font-weight:900;font-size:14px}

  footer{background:var(--ink);color:#bdbdbd;padding:36px 24px;text-align:center;font-size:13px;border-top:2px solid var(--ink)}
  footer b{color:#fffaf2}

  .notfound{max-width:680px;margin:80px auto;padding:48px 32px;text-align:center;border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow)}
  .notfound h1{font-size:48px;letter-spacing:-.02em;margin-bottom:14px}
  .notfound a.btn{display:inline-block;margin-top:24px;padding:14px 22px;background:var(--accent);color:#fff;border:2px solid var(--ink);box-shadow:var(--shadow);font-weight:800}

  /* ===== Cart drawer ===== */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:opacity .25s ease;z-index:100}
  .overlay.open{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,100%);background:var(--bg);border-left:2px solid var(--ink);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:101;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:2px solid var(--ink);flex-shrink:0}
  .drawer-head h3{font-size:24px;letter-spacing:-.02em}
  .drawer-head .x,.modal-head .x{font-size:28px;line-height:1;cursor:pointer;background:none;border:none;font-weight:700;color:var(--ink)}
  .drawer-body{flex:1;overflow-y:auto;padding:8px 24px}
  .empty-cart{text-align:center;color:var(--muted);padding:60px 10px}
  .empty-cart .big{font-size:44px;margin-bottom:12px}
  .empty-cart b{color:var(--ink);font-size:16px}
  .empty-cart p{margin-top:6px;font-size:14px}
  .line{display:flex;gap:14px;padding:16px 0;border-bottom:1px dashed #d8c9b0}
  .line>img{width:64px;height:64px;object-fit:cover;border:2px solid var(--ink);background:var(--soft);flex-shrink:0}
  .l-info{flex:1;min-width:0}
  .l-name{font-weight:800;font-size:14px;line-height:1.25}
  .l-price{color:var(--muted);font-size:12px;margin-top:2px}
  .l-controls{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .stepper{display:flex;align-items:center;border:2px solid var(--ink);background:#fff}
  .stepper button{width:30px;height:30px;border:none;background:transparent;font-weight:900;font-size:16px;cursor:pointer}
  .stepper button:hover{background:var(--soft)}
  .stepper span{width:34px;text-align:center;font-weight:800;font-size:14px}
  .l-total{font-weight:900;font-size:15px}
  .l-remove{margin-top:6px;background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;padding:0}
  .drawer-foot{border-top:2px solid var(--ink);padding:18px 24px;background:var(--soft);flex-shrink:0;max-height:60vh;overflow-y:auto}
  .sub-row{display:flex;justify-content:space-between;font-weight:900;font-size:18px;margin-bottom:4px}
  .free-note{font-size:12px;color:var(--muted);margin-bottom:14px}
  .co-field{margin-bottom:11px}
  .co-field label{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
  .co-field input,.co-field textarea,.co-field select{width:100%;border:2px solid var(--ink);background:#fff;padding:10px 12px;font-size:14px;font-family:inherit}
  .co-field textarea{resize:vertical;min-height:54px}
  .send-order{width:100%;padding:14px;background:var(--accent);color:#fff;border:2px solid var(--ink);box-shadow:var(--shadow);font-weight:900;letter-spacing:.05em;text-transform:uppercase;font-size:14px;cursor:pointer;transition:transform .15s ease;margin-top:4px}
  .send-order:hover{transform:translate(-2px,-2px);background:#161616}
  .co-err{color:var(--accent);font-size:12px;font-weight:700;margin-bottom:10px;display:none}

  /* ===== Review trigger + modal ===== */
  .rv-trigger-light{display:inline-block;margin-bottom:24px;padding:12px 20px;border:2px solid var(--ink);background:var(--ink);color:#fffaf2;font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s ease}
  .rv-trigger-light:hover{transform:translate(-2px,-2px);background:var(--accent)}
  .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:opacity .2s ease;z-index:110;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-wrap.open{opacity:1;visibility:visible}
  .modal{background:var(--bg);border:2px solid var(--ink);box-shadow:var(--shadow);width:min(520px,100%);max-height:90vh;overflow-y:auto}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:2px solid var(--ink)}
  .modal-head h3{font-size:22px;letter-spacing:-.02em;color:var(--ink)}
  .modal-body{padding:22px 24px}
  .star-pick{display:flex;gap:6px;font-size:34px;margin:2px 0;cursor:pointer;user-select:none}
  .star-pick span{color:#d8c9b0;transition:color .1s ease}
  .star-pick span.on{color:var(--accent2)}
  .rv-photos{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .rv-photos img{width:64px;height:64px;object-fit:cover;border:2px solid var(--ink)}
  .rv-note{font-size:12px;color:var(--muted);margin-top:8px;font-style:italic;line-height:1.5}

  @media (max-width: 880px){
    .product{grid-template-columns:1fr;padding-bottom:48px}
    .perks{grid-template-columns:1fr}
    nav ul{display:none}
  }
</style>
</head>
<body>

<div class="promo">
  <span>Free delivery on orders over $19.99 · </span>
  <strong>We live. We love. We lie.</strong>
</div>

<header>
  <div class="nav">
    <a class="brand" href="index.html">
      <div class="dot"></div>
      Martin's Door Is Open
    </a>
    <nav>
      <ul>
        <li><a href="index.html#shop">Shop</a></li>
        <li><a href="index.html#reviews">Reviews</a></li>
        <li><a href="index.html#careers">Careers</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
    <div class="cart">
      <a class="bag" href="#">Bag (0)</a>
    </div>
  </div>
</header>

<div id="root"></div>

<footer>
  © 2026 <b>Martin's Door Is Open</b> · we live · we love · we lie<br/>
  This shop exists in the space between a corner store and a confession booth.
</footer>

<!-- ===== Cart + Reviews module (shared) ===== -->
<script>
(function(){
  const STORE_EMAIL = "buy@mdostore.com";
  const FREE_OVER = 19.99;
  const CATALOG = {
    redbull:{name:"Red Bull · 250ml",price:3.49,img:"https://picsum.photos/seed/mdo-redbull/120/120"},
    tictac:{name:"Tic Tac · Mogu Mogu Rip-Off",price:1.99,img:"https://picsum.photos/seed/mdo-tictac/120/120"},
    apple:{name:"Pink Lady Apples",price:0.89,img:"https://picsum.photos/seed/mdo-apple/120/120"},
    peppa:{name:"Peppa Pig · Plushy Pal",price:12.50,img:"https://picsum.photos/seed/mdo-peppa/120/120"},
    kinder:{name:"Kinder Eggs · Surprise Inside",price:2.20,img:"https://picsum.photos/seed/mdo-kinder/120/120",oos:true},
    "pen-black":{name:"The Pen · Black",price:1.50,img:"https://picsum.photos/seed/mdo-pen/120/120"},
    "pen-blue":{name:"The Pen · Blue",price:1.50,img:"https://picsum.photos/seed/mdo-pen/120/120"},
    "pen-red":{name:"The Pen · Red",price:1.50,img:"https://picsum.photos/seed/mdo-pen/120/120"},
    "pen-green":{name:"The Pen · Green",price:1.50,img:"https://picsum.photos/seed/mdo-pen/120/120"},
    "pen-purple":{name:"The Pen · Purple",price:1.50,img:"https://picsum.photos/seed/mdo-pen/120/120"}
  };

  function getCart(){ try{ return JSON.parse(localStorage.getItem("mdo_cart")||"{}"); }catch(e){ return {}; } }
  function saveCart(c){ localStorage.setItem("mdo_cart", JSON.stringify(c)); sync(); }
  function count(){ return Object.values(getCart()).reduce((a,b)=>a+b,0); }
  function subtotal(){ return Object.entries(getCart()).reduce((s,[id,q])=>s+((CATALOG[id]?CATALOG[id].price:0)*q),0); }

  const overlay = document.createElement("div");
  overlay.className = "overlay";
  const drawer = document.createElement("div");
  drawer.className = "drawer";
  drawer.innerHTML =
    '<div class="drawer-head"><h3>Your Bag</h3><button class="x" aria-label="Close">&times;</button></div>'+
    '<div class="drawer-body" id="mdoLines"></div>'+
    '<div class="drawer-foot" id="mdoFoot"></div>';
  document.body.appendChild(overlay);
  document.body.appendChild(drawer);

  function openDrawer(){ overlay.classList.add("open"); drawer.classList.add("open"); renderLines(); }
  function closeDrawer(){ overlay.classList.remove("open"); drawer.classList.remove("open"); }
  overlay.addEventListener("click", closeDrawer);
  drawer.querySelector(".x").addEventListener("click", closeDrawer);

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderLines(){
    const cart = getCart();
    const ids = Object.keys(cart);
    const lines = document.getElementById("mdoLines");
    const foot = document.getElementById("mdoFoot");
    if(!ids.length){
      lines.innerHTML = '<div class="empty-cart"><div class="big">🛒</div><b>Your bag is empty.</b><p>The shelf is right there. We won\'t judge. (We will.)</p></div>';
      foot.innerHTML = "";
      return;
    }
    lines.innerHTML = ids.map(function(id){
      const p = CATALOG[id]; if(!p) return "";
      const lt = (p.price*cart[id]).toFixed(2);
      return '<div class="line">'+
        '<img src="'+p.img+'" alt="'+esc(p.name)+'" onerror="this.style.opacity=.25">'+
        '<div class="l-info">'+
          '<div class="l-name">'+esc(p.name)+'</div>'+
          '<div class="l-price">$'+p.price.toFixed(2)+' each</div>'+
          '<div class="l-controls">'+
            '<div class="stepper">'+
              '<button data-act="dec" data-id="'+id+'">&minus;</button>'+
              '<span>'+cart[id]+'</span>'+
              '<button data-act="inc" data-id="'+id+'">+</button>'+
            '</div>'+
            '<div class="l-total">$'+lt+'</div>'+
          '</div>'+
          '<button class="l-remove" data-act="rm" data-id="'+id+'">remove</button>'+
        '</div>'+
      '</div>';
    }).join("");

    const sub = subtotal();
    const remain = FREE_OVER - sub;
    foot.innerHTML =
      '<div class="sub-row"><span>Subtotal</span><span>$'+sub.toFixed(2)+'</span></div>'+
      '<div class="free-note">'+(remain>0 ? 'Add $'+remain.toFixed(2)+' more for free delivery.' : '🎉 You unlocked free delivery.')+'</div>'+
      '<div class="co-err" id="mdoErr">Drop your name and a way to reach you.</div>'+
      '<div class="co-field"><label>Name</label><input id="coName" placeholder="Who\'s at the door?"></div>'+
      '<div class="co-field"><label>Email or phone</label><input id="coContact" placeholder="So Martin can confirm"></div>'+
      '<div class="co-field"><label>Deliver to / note (optional)</label><textarea id="coNote" placeholder="Address, building code, secret knock…"></textarea></div>'+
      '<button class="send-order" id="mdoSend">Send order →</button>';

    lines.querySelectorAll("button[data-act]").forEach(function(b){
      b.addEventListener("click", function(){
        const id=b.dataset.id, act=b.dataset.act, c=getCart();
        if(act==="inc") c[id]=(c[id]||0)+1;
        else if(act==="dec") c[id]=(c[id]||0)-1;
        else if(act==="rm") c[id]=0;
        if(c[id]<=0) delete c[id];
        saveCart(c);
      });
    });
    document.getElementById("mdoSend").addEventListener("click", sendOrder);
  }

  function sendOrder(){
    const name=(document.getElementById("coName").value||"").trim();
    const contact=(document.getElementById("coContact").value||"").trim();
    const note=(document.getElementById("coNote").value||"").trim();
    if(!name || !contact){ document.getElementById("mdoErr").style.display="block"; return; }
    const cart=getCart();
    let items="";
    Object.keys(cart).forEach(function(id){
      const p=CATALOG[id]; if(!p) return;
      items += "- "+p.name+" × "+cart[id]+" — $"+(p.price*cart[id]).toFixed(2)+"\n";
    });
    const payload = {
      _subject: "New order — Martin's Door Is Open ($"+subtotal().toFixed(2)+")",
      _template: "table",
      _captcha: "false",
      Name: name,
      Contact: contact,
      Order: items,
      Subtotal: "$"+subtotal().toFixed(2)
    };
    if(note) payload.Note = note;
    const btn=document.getElementById("mdoSend");
    const errEl=document.getElementById("mdoErr");
    btn.disabled=true; btn.textContent="Sending…";
    fetch("https://formsubmit.co/ajax/"+STORE_EMAIL, {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d && (d.success===true || d.success==="true")){
        localStorage.removeItem("mdo_cart");
        document.getElementById("mdoLines").innerHTML='<div class="empty-cart"><div class="big">📨</div><b>Order sent to Martin.</b><p>He replies between sips. Keep an eye on '+esc(contact)+'.</p></div>';
        document.getElementById("mdoFoot").innerHTML="";
        document.querySelectorAll(".bag").forEach(function(b){ b.textContent="Bag (0)"; });
      } else {
        btn.disabled=false; btn.textContent="Send order →";
        errEl.textContent="Couldn't send — try again, or write buy@mdostore.com directly."; errEl.style.display="block";
      }
    }).catch(function(){
      btn.disabled=false; btn.textContent="Send order →";
      errEl.textContent="Network hiccup — try again, or write buy@mdostore.com directly."; errEl.style.display="block";
    });
  }

  function sync(){
    document.querySelectorAll(".bag").forEach(function(b){ b.textContent="Bag ("+count()+")"; });
    if(drawer.classList.contains("open")) renderLines();
  }

  document.querySelectorAll(".bag").forEach(function(b){
    b.addEventListener("click", function(e){ e.preventDefault(); openDrawer(); });
  });

  window.MDOCart = {
    add: function(id, qty){ const c=getCart(); c[id]=(c[id]||0)+(qty||1); saveCart(c); openDrawer(); },
    open: openDrawer
  };

  // ===== Review modal (real multipart form -> FormSubmit, photos auto-attach) =====
  const mWrap=document.createElement("div");
  mWrap.className="modal-wrap";
  mWrap.innerHTML=
    '<form class="modal" action="https://formsubmit.co/'+STORE_EMAIL+'" method="POST" enctype="multipart/form-data">'+
      '<div class="modal-head"><h3>Leave a review</h3><button type="button" class="x">&times;</button></div>'+
      '<div class="modal-body">'+
        '<input type="hidden" name="_subject" value="New review — Martin&#39;s Door Is Open">'+
        '<input type="hidden" name="_template" value="table">'+
        '<input type="hidden" name="_captcha" value="false">'+
        '<input type="hidden" name="_next" value="https://mdostore.com/?review=sent">'+
        '<input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">'+
        '<input type="hidden" name="Rating" id="rvRatingInput" value="">'+
        '<div class="co-field"><label>Your name</label><input name="Name" id="rvName" placeholder="The legend speaking"></div>'+
        '<div class="co-field"><label>Rating</label><div class="star-pick" id="rvStars">'+
          [1,2,3,4,5].map(function(n){return '<span data-n="'+n+'">★</span>';}).join("")+
        '</div></div>'+
        '<div class="co-field"><label>What did you buy?</label><select name="Product" id="rvProduct">'+
          Object.keys(CATALOG).map(function(id){return '<option value="'+esc(CATALOG[id].name)+'">'+esc(CATALOG[id].name)+'</option>';}).join("")+
        '</select></div>'+
        '<div class="co-field"><label>Your review</label><textarea name="Review" id="rvText" placeholder="Tell the truth. Or don\'t. We do both." style="min-height:90px"></textarea></div>'+
        '<div class="co-field"><label>Photos of what you bought</label>'+
          '<input type="file" name="attachment" id="rvPhotos" accept="image/*" multiple>'+
          '<div class="rv-photos" id="rvPreview"></div>'+
          '<div class="rv-note">Up to 10MB total. Photos attach to the email automatically — no copy-paste needed.</div>'+
        '</div>'+
        '<div class="co-err" id="rvErr">Pop in a name, a rating, and a few words.</div>'+
        '<button type="submit" class="send-order" id="rvSend">Send review →</button>'+
      '</div>'+
    '</form>';
  document.body.appendChild(mWrap);

  let rvRating=0;
  const rvRatingInput=mWrap.querySelector("#rvRatingInput");
  const starWrap=mWrap.querySelector("#rvStars");
  function paintStars(hover){
    const v=hover||rvRating;
    starWrap.querySelectorAll("span").forEach(function(s){ s.classList.toggle("on", (+s.dataset.n)<=v); });
  }
  starWrap.querySelectorAll("span").forEach(function(s){
    s.addEventListener("click", function(){ rvRating=+s.dataset.n; rvRatingInput.value=rvRating; paintStars(); });
    s.addEventListener("mouseenter", function(){ paintStars(+s.dataset.n); });
  });
  starWrap.addEventListener("mouseleave", function(){ paintStars(); });

  mWrap.querySelector("#rvPhotos").addEventListener("change", function(e){
    const files=Array.from(e.target.files||[]);
    const prev=mWrap.querySelector("#rvPreview"); prev.innerHTML="";
    files.forEach(function(f){ const im=document.createElement("img"); im.src=URL.createObjectURL(f); prev.appendChild(im); });
  });

  function openReview(prefill){
    if(prefill && CATALOG[prefill]) mWrap.querySelector("#rvProduct").value=CATALOG[prefill].name;
    mWrap.classList.add("open");
  }
  function closeReview(){ mWrap.classList.remove("open"); }
  mWrap.querySelector(".x").addEventListener("click", closeReview);
  mWrap.addEventListener("click", function(e){ if(e.target===mWrap) closeReview(); });

  mWrap.addEventListener("submit", function(e){
    const name=(mWrap.querySelector("#rvName").value||"").trim();
    const text=(mWrap.querySelector("#rvText").value||"").trim();
    const files=mWrap.querySelector("#rvPhotos").files;
    const err=mWrap.querySelector("#rvErr");
    let bytes=0; for(var i=0;i<files.length;i++) bytes+=files[i].size;
    if(!name || !rvRating || !text){ e.preventDefault(); err.textContent="Pop in a name, a rating, and a few words."; err.style.display="block"; return; }
    if(bytes > 10*1024*1024){ e.preventDefault(); err.textContent="Photos exceed 10MB total — trim a couple and retry."; err.style.display="block"; return; }
    // Save to localStorage before FormSubmit redirect
    try{
      var product=mWrap.querySelector("#rvProduct").value||"";
      var all=JSON.parse(localStorage.getItem("mdo_community_reviews")||"[]");
      all.unshift({name:name,rating:rvRating,product:product,review:text,date:new Date().toISOString()});
      localStorage.setItem("mdo_community_reviews",JSON.stringify(all));
    }catch(ex){}
    // valid → native multipart submit to FormSubmit, then _next redirect back
  });

  window.MDOReview={ open: openReview };

  // Render product community reviews (filtered by product name)
  window._renderProductCR=function(productName){
    var el=document.getElementById("crGridProduct");
    if(!el) return;
    var all=[];
    try{all=JSON.parse(localStorage.getItem("mdo_community_reviews")||"[]");}catch(e){}
    var filtered=all.filter(function(r){ return r.product===productName; });
    if(!filtered.length){
      el.innerHTML='<p class="cr-empty">No community reviews yet for this product.</p>';
      return;
    }
    el.innerHTML=filtered.map(function(r){
      var stars="★".repeat(r.rating||0)+"☆".repeat(5-(r.rating||0));
      var d="";
      try{d=new Date(r.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}catch(ex){}
      return '<div class="cr-card">'+
        '<div class="cr-stars">'+stars+'</div>'+
        '<p class="cr-text">'+esc(r.review)+'</p>'+
        '<div class="cr-who">'+esc(r.name)+(d?'<small>'+d+'</small>':'')+'</div>'+
      '</div>';
    }).join("");
  };

  // Thank-you banner after a review redirect (?review=sent)
  (function(){
    try{
      if(new URLSearchParams(location.search).get("review")==="sent"){
        var b=document.createElement("div");
        b.style.cssText="position:fixed;left:50%;top:18px;transform:translateX(-50%);z-index:200;background:#161616;color:#fffaf2;border:2px solid #fffaf2;box-shadow:6px 6px 0 #e63946;padding:14px 20px;font-weight:800;font-size:14px;max-width:90%;text-align:center";
        b.textContent="★ Review received. Martin is reading it. (Allegedly.)";
        document.body.appendChild(b);
        setTimeout(function(){ b.style.transition="opacity .4s"; b.style.opacity="0"; setTimeout(function(){ b.remove(); },400); },5000);
      }
    }catch(e){}
  })();

  sync();
})();
</script>
